<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Did It Days</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3699/3699516.png">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4d6d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Did It Days">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="https://cdn-icons-png.flaticon.com/512/3699/3699516.png" alt="Logo" class="logo">
            <h1>Did It Days</h1>
        </div>
        <button id="add-btn" aria-label="Add session"><span>+</span></button>
    </header>

    <main>
        <div id="calendar-container">
            <div id="calendar-header">
                <button id="prev-month">&lt;</button>
                <h2 id="current-month-year"></h2>
                <button id="next-month">&gt;</button>
            </div>
            <div id="calendar-grid">
                <div class="weekday">Sun</div>
                <div class="weekday">Mon</div>
                <div class="weekday">Tue</div>
                <div class="weekday">Wed</div>
                <div class="weekday">Thu</div>
                <div class="weekday">Fri</div>
                <div class="weekday">Sat</div>
            </div>
            <div id="calendar-days"></div>
        </div>

        <div id="day-detail" class="hidden">
            <h3 id="detail-date"></h3>
            <ul id="detail-list"></ul>
            <button id="close-detail">Close</button>
        </div>
    </main>

    <div id="modal" class="hidden">
        <div class="modal-content">
            <h3>New Session</h3>
            <form id="session-form">
                <div class="form-group">
                    <label for="session-date">Date</label>
                    <input type="date" id="session-date" required>
                </div>
                <div class="form-group">
                    <label for="session-time">Time</label>
                    <input type="time" id="session-time" required>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-modal">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <button id="export-btn">Export Data</button>
        <button id="import-btn">Import Data</button>
        <input type="file" id="import-file" accept=".json" style="display: none;">
    </footer>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => {
                        console.log('Service Worker registered');
                        
                        // Check for updates
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed') {
                                    if (navigator.serviceWorker.controller) {
                                        // New version found, reload
                                        console.log('New version found, reloading...');
                                        window.location.reload();
                                    }
                                }
                            };
                        };
                    })
                    .catch(err => console.log('Service Worker registration failed', err));
            });
            
            // Listen for the controlling service worker to change
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
</body>
</html>
